const map = L.map('map', { zoomControl: false, scrollWheelZoom: true }).setView([40.4168,-3.6988], 14);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const typeIcons = { hotel:'★', confirmed:'✓', restaurant:'🍴', site:'◆', transit:'⇄', experience:'✦' };
function createIcon(type) {
  return L.divIcon({
    className: '',
    html: `<div class="marker-icon marker-${type}"><span>${typeIcons[type]}</span></div>`,
    iconSize: [32,32], iconAnchor: [16,32], popupAnchor: [0,-30]
  });
}
function buildPopup(loc) {
  const tagLabel = { hotel:'Hotel', confirmed:'Confirmed Booking', restaurant:'Restaurant', site:'Site', transit:'Transit', experience:'Experience' }[loc.type];
  const gmapsQ = encodeURIComponent(loc.name + ', ' + loc.address);
  return `<div class="popup">
    <span class="popup-tag tag-${loc.type}">${tagLabel}</span>
    <h3>${loc.name}</h3>
    <div class="address">${loc.address}</div>
    ${loc.meta ? `<div class="meta">${loc.meta}</div>` : ''}
    ${loc.notes ? `<div class="notes">${loc.notes}</div>` : ''}
    ${loc.conf ? `<div class="conf-code">${loc.conf}</div>` : ''}
    <div class="actions">
      <a class="primary" href="https://www.google.com/maps/search/?api=1&query=${gmapsQ}" target="_blank" rel="noopener">Open in Google Maps</a>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${gmapsQ}" target="_blank" rel="noopener">Directions</a>
    </div>
  </div>`;
}

let currentMarkers = [];
let activeFilters = new Set(['hotel','confirmed','restaurant','site','transit','experience']);
let currentCity = null;

function clearMarkers() { currentMarkers.forEach(m => map.removeLayer(m)); currentMarkers = []; }
function renderCity(key) {
  currentCity = key;
  const city = cities[key];
  clearMarkers();
  document.getElementById('cityInfo').innerHTML = `<div class="name">${city.name}</div><div class="hotel-line">${city.dates} · ${city.hotel}</div>`;
  const counts = { hotel:0, confirmed:0, restaurant:0, site:0, transit:0, experience:0 };
  city.locations.forEach(l => counts[l.type]++);
  Object.keys(counts).forEach(t => { const el = document.getElementById('count-'+t); if (el) el.textContent = counts[t]; });
  city.locations.forEach(loc => {
    if (!activeFilters.has(loc.type)) return;
    const marker = L.marker(loc.coords, { icon: createIcon(loc.type) }).bindPopup(buildPopup(loc), { maxWidth: 320 }).addTo(map);
    currentMarkers.push(marker);
  });
  if (currentMarkers.length > 0) {
    const bounds = L.latLngBounds(currentMarkers.map(m => m.getLatLng()));
    map.fitBounds(bounds, { padding: [60,60], maxZoom: city.zoom });
  } else {
    map.setView(city.center, city.zoom);
  }
  document.querySelectorAll('.city-tab').forEach(t => t.classList.toggle('active', t.dataset.city === key));
}

const tabBar = document.getElementById('cityTabs');
Object.keys(cities).forEach(key => {
  const city = cities[key];
  const btn = document.createElement('button');
  btn.className = 'city-tab';
  btn.dataset.city = key;
  btn.innerHTML = `${city.name}<span class="dates">${city.dates}</span>`;
  btn.addEventListener('click', () => renderCity(key));
  tabBar.appendChild(btn);
});

document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const type = item.dataset.type;
    if (activeFilters.has(type)) { activeFilters.delete(type); item.classList.add('disabled'); }
    else { activeFilters.add(type); item.classList.remove('disabled'); }
    if (currentCity) renderCity(currentCity);
  });
});

const startCity = window.location.hash.replace('#','');
renderCity(cities[startCity] ? startCity : 'madrid');
window.addEventListener('hashchange', () => {
  const c = window.location.hash.replace('#','');
  if (cities[c]) renderCity(c);
});
</script>
